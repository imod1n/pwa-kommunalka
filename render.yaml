services:
  - type: web
    name: kommunalka-api
    runtime: python
    region: frankfurt
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MONGO_URL
        sync: false   # Задать вручную в Render dashboard
      - key: DB_NAME
        value: kommunalka
    healthCheckPath: /health
